services:
  postgres:
    image: postgres:17

    restart: unless-stopped

    # Load environment variables from .env
    env_file:
      - .env

    # Persist database files
    volumes:
      - /opt/atlas/data/postgres:/var/lib/postgresql/data

    # Expose PostgreSQL for administration (e.g. DBeaver)
    ports:
      - "5432:5432"

    networks:
      - atlas-network

networks:
  atlas-network:
    external: true